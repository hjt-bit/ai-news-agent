name: Weekly AI Newsletter

# Runs every Sunday at 13:00 UTC = 17:00 Dubai/GST so the newsletter is ready well before Monday 08:00 share time. Can also be triggered manually.
on:
  schedule:
    - cron: '0 13 * * 0'   # Sun 13:00 UTC = 17:00 Dubai (GST, UTC+4) — ready overnight, no Monday morning rush
  workflow_dispatch:        # adds a "Run workflow" button in the GitHub UI

permissions:
  contents: write           # allow the workflow to commit the generated newsletter

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the newsletter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agent.py

      - name: Move outputs into /newsletters/
        run: |
          mkdir -p newsletters
          mv newsletter_*.html newsletters/ 2>/dev/null || true
          mv linkedin_post_*.md newsletters/ 2>/dev/null || true
          mv email_post_*.md newsletters/ 2>/dev/null || true

      - name: Rebuild homepage archive (index.html)
        run: python build_index.py

      - name: Disable Jekyll on GitHub Pages
        # Ensures GitHub Pages serves our custom index.html as-is
        # instead of auto-rendering README.md through the Jekyll theme.
        run: touch .nojekyll

      - name: Commit the new newsletter and refreshed homepage
        run: |
          git config user.name  "ai-news-agent"
          git config user.email "actions@users.noreply.github.com"
          git add newsletters/ index.html .nojekyll podcast_review.md qa_report.md
          git diff --staged --quiet || git commit -m "Weekly newsletter: $(date -u +%Y-%m-%d)"
          git push
